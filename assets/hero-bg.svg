<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgv" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#193059"/>
      <stop offset="0.55" stop-color="#122444"/>
      <stop offset="1" stop-color="#0b1830"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d8ad4e" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#d8ad4e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="area2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4f7bb8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#4f7bb8" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="74%" cy="16%" r="60%">
      <stop offset="0" stop-color="#c99a34" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#c99a34" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="58" height="58" patternUnits="userSpaceOnUse">
      <path d="M58 0H0V58" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1440" height="900" fill="url(#bgv)"/>
  <rect width="1440" height="900" fill="url(#grid)"/>
  <rect width="1440" height="900" fill="url(#glow)"/>

  <!-- secondary (steel) data series -->
  <path d="M0,780 L180,760 L360,770 L540,700 L720,730 L900,650 L1080,680 L1260,600 L1440,560 L1440,900 L0,900 Z" fill="url(#area2)"/>
  <path d="M0,780 L180,760 L360,770 L540,700 L720,730 L900,650 L1080,680 L1260,600 L1440,560" fill="none" stroke="#5f86bf" stroke-opacity="0.35" stroke-width="2"/>

  <!-- primary (gold) growth series -->
  <path d="M0,700 L180,680 L360,640 L540,672 L720,560 L900,588 L1080,470 L1260,500 L1440,360 L1440,900 L0,900 Z" fill="url(#area)"/>
  <path d="M0,700 L180,680 L360,640 L540,672 L720,560 L900,588 L1080,470 L1260,500 L1440,360" fill="none" stroke="#e0b64f" stroke-opacity="0.55" stroke-width="2.6"/>
  <g fill="#efc96a" fill-opacity="0.85">
    <circle cx="360" cy="640" r="4.5"/><circle cx="720" cy="560" r="4.5"/><circle cx="1080" cy="470" r="4.5"/><circle cx="1440" cy="360" r="5"/>
  </g>

  <!-- bar chart cluster -->
  <g fill="#3f68a3" fill-opacity="0.20">
    <rect x="96" y="470" width="30" height="250"/>
    <rect x="138" y="410" width="30" height="310"/>
    <rect x="180" y="500" width="30" height="220"/>
    <rect x="222" y="360" width="30" height="360"/>
    <rect x="264" y="440" width="30" height="280"/>
  </g>

  <!-- upward arrow accent -->
  <g stroke="#e0b64f" stroke-opacity="0.4" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1230 250 L1330 150"/>
    <path d="M1288 150 H1330 V192"/>
  </g>
</svg>
